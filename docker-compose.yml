services:
  fhir:
    depends_on:
      - mongo
      - redis
      #- validator
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SERVER_HOST: localhost
      SERVER_PORT: 3000
      BASE_URL: http://localhost:3000
      DB_HOST: mongo
      DB_PORT: 27017
      DB_NAME: deqm-test-server
      IMPORT_WORKERS: 2
      NDJSON_WORKERS: 2
      DELETE_WORKERS: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      VALIDATE: 'false'
      VALIDATOR_HOST: validator
      VALIDATOR_PORT: 4567
    ports:
      - '3000:3000'
    stdin_open: true
    tty: true

  mongo:
    image: mongo:6
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: dhi.io/redis:8
    command: ["redis-server", "--protected-mode no"]
    expose:
      - '6379'

  # Disabled for now
  # validator:
  #   image: infernocommunity/fhir-validator-service
  #   ports:
  #     - '4567:4567'

  # TODO: Revisit keycloak setup when using an OAuth-enabled test server
